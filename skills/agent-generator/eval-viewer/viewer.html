<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eval Review</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    /* ---- Mona Sans font (GitHub brand) ---- */
    @font-face {
      font-family: 'Mona Sans';
      src: url('https://github.githubassets.com/static/fonts/Mona-Sans.woff2') format('woff2');
      font-weight: 200 900;
      font-style: normal;
    }

    /* ---- GitHub Primer design tokens ---- */
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface-secondary: #f6f8fa;
      --border: #d0d7de;
      --border-muted: #d8dee4;
      --text: #1f2328;
      --text-muted: #636c76;
      --text-placeholder: #8c959f;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --accent-muted: #ddf4ff;
      --accent-emphasis: #0550ae;
      --header-bg: #24292f;
      --header-text: #ffffff;
      --header-text-muted: #8b949e;
      --green: #1a7f37;
      --green-bg: #dafbe1;
      --green-text: #116329;
      --red: #d1242f;
      --red-bg: #ffebe9;
      --red-text: #a40e26;
      --yellow: #9a6700;
      --yellow-bg: #fff8c5;
      --orange: #bc4c00;
      --orange-bg: #fff1e5;
      --shadow-sm: 0 1px 0 rgba(31,35,40,0.04);
      --shadow-md: 0 3px 6px rgba(140,149,159,0.15);
      --radius: 6px;
      --radius-lg: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- GitHub-style header ---- */
    .site-header {
      background: var(--header-bg);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .site-header-logo svg {
      fill: var(--header-text);
      flex-shrink: 0;
    }

    .site-header-divider {
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      font-weight: 300;
      user-select: none;
    }

    .site-header-title {
      color: var(--header-text);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .skill-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--header-text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .skill-badge svg { fill: var(--header-text-muted); }

    #skill-name {
      color: var(--header-text);
    }

    /* ---- Main layout ---- */
    .app-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ---- Navigation bar ---- */
    .nav-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .nav-btn svg { fill: currentColor; }

    .nav-counter {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .run-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .view-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.1s, border-color 0.1s;
    }

    .view-tab:hover { color: var(--text); }

    .view-tab.active {
      color: var(--text);
      border-bottom-color: var(--orange);
    }

    /* ---- Cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-muted);
      background: var(--surface-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .card-header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-body {
      padding: 16px;
    }

    /* ---- Eval prompt ---- */
    .eval-prompt {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ---- Expectations / grades ---- */
    .grades-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.1s;
    }

    .grades-toggle:hover { background: var(--bg); color: var(--text); }
    .grades-toggle svg { fill: currentColor; }

    .grades-container {
      margin-top: 12px;
    }

    .grade-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
      line-height: 1.5;
    }

    .grade-item.pass {
      background: var(--green-bg);
      border: 1px solid #b7f0c4;
    }

    .grade-item.fail {
      background: var(--red-bg);
      border: 1px solid #ffceca;
    }

    .grade-item.unknown {
      background: var(--yellow-bg);
      border: 1px solid #e5ce7a;
    }

    .grade-icon {
      flex-shrink: 0;
      margin-top: 1px;
    }

    .grade-icon.pass svg { fill: var(--green); }
    .grade-icon.fail svg { fill: var(--red); }
    .grade-icon.unknown svg { fill: var(--yellow); }

    .grade-text { flex: 1; }

    .grade-text strong {
      font-weight: 600;
    }

    .grade-evidence {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .pass-rate-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .pass-rate-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .pass-rate-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* ---- Output files ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .output-file-header {
      padding: 8px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .output-file-header:hover { background: #eaeef2; }

    .output-file-name {
      font-size: 12px;
      font-weight: 600;
      font-family: 'SF Mono', 'Cascadia Mono', 'Fira Code', Consolas, 'Liberation Mono', Menlo, monospace;
      color: var(--accent);
      flex: 1;
    }

    .output-file-size {
      font-size: 11px;
      color: var(--text-placeholder);
    }

    .output-file-toggle {
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform 0.15s;
      display: flex;
      align-items: center;
    }

    .output-file-toggle svg { fill: currentColor; }
    .output-file-toggle.open { transform: rotate(90deg); }

    .output-file-content {
      padding: 12px;
      display: none;
      background: var(--surface);
    }

    .output-file-content.visible { display: block; }

    .output-file-content pre {
      font-size: 12px;
      font-family: 'SF Mono', 'Cascadia Mono', 'Fira Code', Consolas, 'Liberation Mono', Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      line-height: 1.6;
    }

    .output-file-content table {
      border-collapse: collapse;
      font-size: 12px;
      width: 100%;
      overflow-x: auto;
      display: block;
    }

    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 4px 8px;
    }

    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }

    /* ---- Feedback ---- */
    .feedback-textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
    }

    .feedback-textarea::placeholder { color: var(--text-placeholder); }

    .feedback-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      min-height: 16px;
    }

    .feedback-status.saved { color: var(--green); }

    /* ---- Transcript link ---- */
    .transcript-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      padding: 4px 0;
    }

    .transcript-link:hover { text-decoration: underline; }
    .transcript-link svg { fill: currentColor; }

    /* ---- Benchmark table ---- */
    .benchmark-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .benchmark-table th,
    .benchmark-table td {
      border: 1px solid var(--border);
      padding: 7px 12px;
      text-align: left;
    }

    .benchmark-table th {
      background: var(--bg);
      font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .benchmark-table tr:hover { background: var(--surface-secondary); }

    .benchmark-table tr.benchmark-row-with { background: rgba(9,105,218,0.05); }
    .benchmark-table tr.benchmark-row-without { background: rgba(154,103,0,0.05); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(9,105,218,0.1); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(154,103,0,0.1); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(9,105,218,0.1); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(154,103,0,0.1); }

    .pass-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .pass-chip.high { background: var(--green-bg); color: var(--green-text); }
    .pass-chip.mid { background: var(--yellow-bg); color: var(--yellow); }
    .pass-chip.low { background: var(--red-bg); color: var(--red-text); }

    /* ---- Previous outputs section ---- */
    .prev-section {
      margin-top: 24px;
    }

    .section-heading {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--header-bg);
      color: var(--header-text);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---- Empty / loading states ---- */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state svg {
      fill: var(--border);
      margin-bottom: 12px;
    }

    /* ---- Util ---- */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-8 { gap: 8px; }
    .ml-auto { margin-left: auto; }
    .hidden { display: none !important; }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .app-container { padding: 12px 8px; }
      .nav-bar { flex-wrap: wrap; gap: 8px; }
      .run-title { min-width: 0; }
    }
  </style>
</head>
<body>

  <!-- GitHub-style header -->
  <header class="site-header">
    <a class="site-header-logo" href="#" aria-label="GitHub">
      <!-- GitHub mark (octocat outline) -->
      <svg height="24" width="24" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
    </a>
    <span class="site-header-divider">/</span>
    <span class="site-header-title">Eval Review</span>
    <div class="skill-badge">
      <!-- git-branch octicon -->
      <svg height="12" width="12" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25Zm-6 0a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Zm8.25-.75a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5ZM4.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Z"/>
      </svg>
      <span id="skill-name">loading…</span>
    </div>
  </header>

  <!-- App -->
  <div class="app-container">

    <!-- Navigation -->
    <div class="nav-bar">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" aria-label="Previous run">
        <!-- arrow-left octicon -->
        <svg height="14" width="14" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L4.81 7h7.44a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06Z"/>
        </svg>
        Prev
      </button>
      <span class="nav-counter" id="nav-counter">— of —</span>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)" aria-label="Next run">
        Next
        <!-- arrow-right octicon -->
        <svg height="14" width="14" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8.22 2.97a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l2.97-2.97H3.75a.75.75 0 0 1 0-1.5h7.44L8.22 4.03a.75.75 0 0 1 0-1.06Z"/>
        </svg>
      </button>
      <span class="run-title" id="run-title"></span>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">Outputs</button>
      <button class="view-tab" onclick="switchView('benchmark')">Benchmark</button>
    </div>

    <!-- ===== OUTPUTS VIEW ===== -->
    <div id="outputs-view">

      <!-- Eval prompt -->
      <div class="card" id="prompt-card">
        <div class="card-header">
          <svg height="14" width="14" viewBox="0 0 16 16" fill="var(--text-muted)" aria-hidden="true">
            <path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0 1 14.25 13H8.061l-2.574 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-8.5a.25.25 0 0 0-.25-.25Z"/>
          </svg>
          <span class="card-header-title">Eval Prompt</span>
          <div class="card-header-actions">
            <a class="transcript-link" id="transcript-link" href="#" target="_blank">
              <svg height="12" width="12" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/>
              </svg>
              View transcript
            </a>
          </div>
        </div>
        <div class="card-body">
          <div class="eval-prompt" id="eval-prompt"></div>
        </div>
      </div>

      <!-- Expectations / grades -->
      <div class="card" id="grades-card">
        <div class="card-header">
          <svg height="14" width="14" viewBox="0 0 16 16" fill="var(--text-muted)" aria-hidden="true">
            <path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-.018-1.042.751.751 0 0 0-1.042-.018L6.75 9.19 5.28 7.72a.751.751 0 0 0-1.042.018.751.751 0 0 0-.018 1.042l2 2a.75.75 0 0 0 1.06 0Z"/>
          </svg>
          <span class="card-header-title">Expectations</span>
          <span class="card-header-subtitle" id="grades-summary"></span>
          <div class="card-header-actions">
            <button class="grades-toggle" id="grades-toggle-btn" onclick="toggleGrades()">
              <svg height="12" width="12" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M6 2c.306 0 .582.187.696.471L10 10.731l1.304-3.26A.751.751 0 0 1 12 7h3.25a.75.75 0 0 1 0 1.5h-2.742l-1.812 4.528a.75.75 0 0 1-1.392 0L6 4.77 4.696 8.029A.75.75 0 0 1 4 8.5H.75a.75.75 0 0 1 0-1.5h2.742L5.304 2.471A.75.75 0 0 1 6 2Z"/>
              </svg>
              Show grades
            </button>
          </div>
        </div>
        <div class="card-body" id="grades-body" style="display:none;">
          <div class="pass-rate-bar"><div class="pass-rate-fill" id="pass-rate-fill"></div></div>
          <div class="pass-rate-label" id="pass-rate-label"></div>
          <div class="grades-container" id="grades-container"></div>
        </div>
      </div>

      <!-- Output files -->
      <div class="card">
        <div class="card-header">
          <svg height="14" width="14" viewBox="0 0 16 16" fill="var(--text-muted)" aria-hidden="true">
            <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688Z"/>
          </svg>
          <span class="card-header-title">Output Files</span>
        </div>
        <div class="card-body" id="outputs-container"></div>
      </div>

      <!-- Feedback -->
      <div class="card">
        <div class="card-header">
          <svg height="14" width="14" viewBox="0 0 16 16" fill="var(--text-muted)" aria-hidden="true">
            <path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.458 1.458 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25ZM2.75 2.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
          </svg>
          <span class="card-header-title">Feedback</span>
          <span class="feedback-status" id="feedback-status" style="margin-left:auto;"></span>
        </div>
        <div class="card-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="Optional notes on this run — strengths, issues, what to improve…"
          ></textarea>
        </div>
      </div>

      <!-- Previous outputs (shown when comparison data exists) -->
      <div id="prev-outputs-section" style="display:none;">
        <div class="section-heading">Previous outputs</div>
        <div id="prev-outputs-container"></div>
      </div>

    </div><!-- /outputs-view -->

    <!-- ===== BENCHMARK VIEW ===== -->
    <div id="benchmark-view" style="display:none;">
      <div class="card">
        <div class="card-header">
          <svg height="14" width="14" viewBox="0 0 16 16" fill="var(--text-muted)" aria-hidden="true">
            <path d="M0 1.75A.75.75 0 0 1 .75 1h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 1.75ZM0 8a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm0 6.25a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H.75a.75.75 0 0 1-.75-.75Z"/>
          </svg>
          <span class="card-header-title">Benchmark Results</span>
        </div>
        <div class="card-body" style="padding:0; overflow:auto;">
          <table class="benchmark-table" id="benchmark-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div><!-- /benchmark-view -->

  </div><!-- /app-container -->

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----
    /*__EMBEDDED_DATA__*/

    // ---- State ----
    let feedbackMap = {};  // run_id -> feedback text
    let currentIndex = 0;
    let visitedRuns = new Set();

    // ---- Init ----
    async function init() {
      const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run — no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });

      // Show benchmark tab only if data exists
      if (EMBEDDED_DATA.benchmark) {
        document.getElementById("view-tabs").style.display = "";
        renderBenchmarkTable(EMBEDDED_DATA.benchmark);
      }
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    function showRun(index) {
      currentIndex = index;
      visitedRuns.add(index);
      const run = EMBEDDED_DATA.runs[index];

      document.getElementById("nav-counter").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;
      document.getElementById("run-title").textContent = run.eval_name || run.id || "";
      document.getElementById("eval-prompt").textContent = run.eval_prompt || "(no prompt)";

      // Transcript link
      const tLink = document.getElementById("transcript-link");
      if (run.transcript_path) {
        tLink.href = run.transcript_path;
        tLink.style.display = "";
      } else {
        tLink.style.display = "none";
      }

      renderOutputs(run);
      renderGrades(run);
      renderPrevOutputs(run);

      // Restore saved feedback
      const savedFeedback = feedbackMap[run.id] || "";
      const fbPrevious = (EMBEDDED_DATA.previous_feedback || {})[run.id] || "";
      document.getElementById("feedback").value = savedFeedback || fbPrevious;
      document.getElementById("feedback-status").textContent = "";
      document.getElementById("feedback-status").className = "feedback-status";

      updateNavButtons();

      // Mark all visited if we've seen all
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        // All runs reviewed — nothing special needed
      }
    }

    // ---- Render output files ----
    function renderOutputs(run) {
      const container = document.getElementById("outputs-container");
      container.innerHTML = "";
      if (!run.outputs || run.outputs.length === 0) {
        container.innerHTML = '<div class="empty-state"><svg height="24" width="24" viewBox="0 0 16 16"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688Z"/></svg><p>No output files</p></div>';
        return;
      }
      for (const file of run.outputs) {
        const el = document.createElement("div");
        el.className = "output-file";
        const sizeLabel = file.size ? ` · ${formatSize(file.size)}` : "";
        el.innerHTML = `
          <div class="output-file-header" onclick="toggleFile(this)">
            <span class="output-file-name">${escHtml(file.name)}</span>
            <span class="output-file-size">${escHtml(file.type || "")}${sizeLabel}</span>
            <span class="output-file-toggle">
              <svg height="12" width="12" viewBox="0 0 16 16" fill="currentColor">
                <path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/>
              </svg>
            </span>
          </div>
          <div class="output-file-content"></div>
        `;
        const content = el.querySelector(".output-file-content");
        if (file.type === "xlsx") {
          renderXlsx(content, file.content);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = file.content || "(empty)";
          content.appendChild(pre);
        }
        container.appendChild(el);
      }
    }

    function toggleFile(header) {
      const content = header.nextElementSibling;
      const toggle = header.querySelector(".output-file-toggle");
      const isOpen = content.classList.contains("visible");
      content.classList.toggle("visible", !isOpen);
      toggle.classList.toggle("open", !isOpen);
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        if (typeof XLSX === "undefined") {
          container.innerHTML = "<pre>SheetJS not loaded — cannot render xlsx</pre>";
          return;
        }
        const wb = XLSX.read(b64Data, { type: "base64" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
        const wrapper = document.createElement("div");
        wrapper.innerHTML = htmlStr;
        // Apply output-file-content table styles
        container.appendChild(wrapper);
      } catch (e) {
        container.innerHTML = `<pre>Error rendering xlsx: ${escHtml(String(e))}</pre>`;
      }
    }

    // ---- Render grades ----
    function renderGrades(run) {
      const gradesContainer = document.getElementById("grades-container");
      const summaryEl = document.getElementById("grades-summary");
      const fillEl = document.getElementById("pass-rate-fill");
      const labelEl = document.getElementById("pass-rate-label");
      gradesContainer.innerHTML = "";

      const grading = run.grading;
      if (!grading || !grading.expectations) {
        summaryEl.textContent = "";
        return;
      }

      const total = grading.summary?.total || grading.expectations.length;
      const passed = grading.summary?.passed ?? grading.expectations.filter(e => e.passed).length;
      const rate = total > 0 ? Math.round((passed / total) * 100) : 0;

      summaryEl.textContent = `${passed}/${total} passed`;
      fillEl.style.width = `${rate}%`;
      labelEl.textContent = `${rate}% pass rate`;

      for (const exp of grading.expectations) {
        const div = document.createElement("div");
        const statusClass = exp.passed === true ? "pass" : exp.passed === false ? "fail" : "unknown";
        div.className = `grade-item ${statusClass}`;

        let iconSvg;
        if (statusClass === "pass") {
          iconSvg = `<svg height="14" width="14" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-.018-1.042.751.751 0 0 0-1.042-.018L6.75 9.19 5.28 7.72a.751.751 0 0 0-1.042.018.751.751 0 0 0-.018 1.042l2 2a.75.75 0 0 0 1.06 0Z"/></svg>`;
        } else if (statusClass === "fail") {
          iconSvg = `<svg height="14" width="14" viewBox="0 0 16 16"><path d="M2.344 2.343h-.001a8 8 0 0 1 11.314 11.314A8.002 8.002 0 0 1 0 8a7.998 7.998 0 0 1 2.344-5.657ZM5.03 4.97a.751.751 0 0 0-1.042.018.751.751 0 0 0-.018 1.042L6.94 9 4.97 10.97a.749.749 0 0 0 .326 1.275.749.749 0 0 0 .734-.215L8 9.06l1.97 1.97a.749.749 0 0 0 1.275-.326.749.749 0 0 0-.215-.734L9.06 8l1.97-1.97a.749.749 0 0 0-.326-1.275.749.749 0 0 0-.734.215L8 6.94Z"/></svg>`;
        } else {
          iconSvg = `<svg height="14" width="14" viewBox="0 0 16 16"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.92 6.085h.001a.749.749 0 1 1-1.342-.67c.169-.339.436-.701.849-.977C6.845 4.16 7.369 4 8 4a2.756 2.756 0 0 1 1.637.525c.503.377.863.965.863 1.725 0 .458-.124.83-.345 1.136-.205.287-.470.498-.710.664l-.268.19c-.257.175-.378.282-.441.400a.625.625 0 0 0-.068.284.75.75 0 1 1-1.5 0c0-.438.157-.814.386-1.117.194-.256.433-.445.661-.6l.26-.183c.28-.197.392-.313.434-.372a.42.42 0 0 0 .092-.292c0-.198-.088-.368-.224-.47a1.255 1.255 0 0 0-.762-.218c-.376 0-.617.095-.787.217ZM8 11a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg>`;
        }

        div.innerHTML = `
          <span class="grade-icon ${statusClass}">${iconSvg}</span>
          <div class="grade-text">
            <strong>${escHtml(exp.text)}</strong>
            ${exp.evidence ? `<div class="grade-evidence">${escHtml(exp.evidence)}</div>` : ""}
          </div>
        `;
        gradesContainer.appendChild(div);
      }
    }

    function toggleGrades() {
      const body = document.getElementById("grades-body");
      const btn = document.getElementById("grades-toggle-btn");
      const isShown = body.style.display !== "none";
      body.style.display = isShown ? "none" : "";
      btn.innerHTML = btn.innerHTML.replace(
        isShown ? "Hide grades" : "Show grades",
        isShown ? "Show grades" : "Hide grades"
      );
    }

    // ---- Render previous outputs ----
    function renderPrevOutputs(run) {
      const section = document.getElementById("prev-outputs-section");
      const container = document.getElementById("prev-outputs-container");
      container.innerHTML = "";

      const prevOutputs = (EMBEDDED_DATA.previous_outputs || {})[run.id];
      if (!prevOutputs || prevOutputs.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "";
      for (const file of prevOutputs) {
        const card = document.createElement("div");
        card.className = "card";
        const sizeLabel = file.size ? ` · ${formatSize(file.size)}` : "";
        card.innerHTML = `
          <div class="card-header">
            <span class="card-header-title">${escHtml(file.name)}</span>
            <span class="card-header-subtitle">${escHtml(file.type || "")}${sizeLabel}</span>
          </div>
          <div class="card-body">
            <pre style="font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-word;">${escHtml(file.content || "(empty)")}</pre>
          </div>
        `;
        container.appendChild(card);
      }
    }

    // ---- Feedback ----
    async function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      feedbackMap[run.id] = text;
      const statusEl = document.getElementById("feedback-status");
      statusEl.textContent = "Saving…";
      statusEl.className = "feedback-status";
      try {
        const resp = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ run_id: run.id, feedback: text })
        });
        if (resp.ok) {
          statusEl.textContent = "Saved";
          statusEl.className = "feedback-status saved";
          setTimeout(() => { statusEl.textContent = ""; }, 2000);
        } else {
          statusEl.textContent = "Save failed";
        }
      } catch {
        statusEl.textContent = "Offline — not saved";
      }
    }

    // ---- Benchmark table ----
    function renderBenchmarkTable(data) {
      if (!data || !data.rows || data.rows.length === 0) return;

      const table = document.getElementById("benchmark-table");
      const thead = table.querySelector("thead");
      const tbody = table.querySelector("tbody");

      // Build header
      const headerCols = data.columns || ["Eval", "With skill", "Without skill", "Delta"];
      thead.innerHTML = `<tr>${headerCols.map(c => `<th>${escHtml(c)}</th>`).join("")}</tr>`;

      // Build rows
      for (const row of data.rows) {
        const tr = document.createElement("tr");
        tr.className = row.row_class || "";
        for (const cell of row.cells) {
          const td = document.createElement("td");
          if (cell.type === "rate") {
            const pct = Math.round((cell.value || 0) * 100);
            const cls = pct >= 80 ? "high" : pct >= 50 ? "mid" : "low";
            td.innerHTML = `<span class="pass-chip ${cls}">${pct}%</span>`;
          } else if (cell.type === "delta") {
            const pct = Math.round((cell.value || 0) * 100);
            const sign = pct >= 0 ? "+" : "";
            td.innerHTML = `<span style="font-weight:600;color:${pct > 0 ? "var(--green)" : pct < 0 ? "var(--red)" : "var(--text-muted)"}">${sign}${pct}%</span>`;
          } else {
            td.textContent = cell.value !== undefined ? String(cell.value) : "";
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    // ---- View switching ----
    function switchView(view) {
      const tabs = document.querySelectorAll(".view-tab");
      const outputsView = document.getElementById("outputs-view");
      const benchmarkView = document.getElementById("benchmark-view");

      tabs.forEach(t => t.classList.remove("active"));
      if (view === "outputs") {
        tabs[0].classList.add("active");
        outputsView.style.display = "";
        benchmarkView.style.display = "none";
      } else {
        tabs[1].classList.add("active");
        outputsView.style.display = "none";
        benchmarkView.style.display = "";
      }
    }

    // ---- Keyboard navigation ----
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowLeft" || e.key === "h") navigate(-1);
      if (e.key === "ArrowRight" || e.key === "l") navigate(1);
    });

    // ---- Toast ----
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ---- Utilities ----
    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    // ---- Boot ----
    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
